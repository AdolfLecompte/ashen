# ══════════════════════════════════════════
#   Ashen — Hypridle
# ══════════════════════════════════════════
general {
    lock_cmd = qs ipc -c ashen call lockscreen lock
    # sleep 1 keeps hypridle's inhibitor held ~1s after firing the lock, so the
    # WlSessionLock surface finishes mapping and grabbing input before the system
    # suspends. Without it the lock races the suspend and resumes frozen (no input).
    before_sleep_cmd = qs ipc -c ashen call lockscreen lock && sleep 1
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Auto-lock after 5 minutes idle
listener {
    timeout = 300
    on-timeout = qs ipc -c ashen call lockscreen lock
}

# Turn the screen off after 10 minutes (if still idle after locking)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 15 minutes idle
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
