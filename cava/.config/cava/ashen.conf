# Profile used by the bar (quickshell). Raw ascii output: the bar
# reads 0-100 values separated by ';' from stdout.
[general]
framerate = 60
bars = 96
autosens = 1

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
channels = mono

[smoothing]
noise_reduction = 45
